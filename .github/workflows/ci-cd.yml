name: Azure ML Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUBSCRIPTION_ID: ${{ secrets.SUBSCRIPTION_ID }}
      RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
      WORKSPACE_NAME: ${{ secrets.WORKSPACE_NAME }}
      LOCATION: ${{ secrets.LOCATION}}
      EXPERIMENT_NAME: ${{ secrets.EXPERIMENT_NAME }}
      DATA_FILE: ${{ secrets.DATA_FILE }}
      COMPUTE_NAME: ${{ secrets.COMPUTE_NAME }}
      MODEL_NAME: ${{ secrets.MODEL_NAME }}
      ENDPOINT_NAME: ${{ secrets.ENDPOINT_NAME }}
      DEPLOYMENT_NAME: ${{ secrets.DEPLOYMENT_NAME }}
      VM_SIZE: ${{ secrets.VM_SIZE }}

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13.5"

      - name: Install Requirements
        run: pip install -r requirements.txt
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }} 

      - name: Run Azure Setup
        run: python setup_azure.py

      - name: Train Model
        run: python train.py

      - name: Deploy Model
        run: python deploy.py
